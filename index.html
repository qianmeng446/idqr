    <script type="text/javascript">$(document).ready(function() {

        /* ----- 侧边悬浮 ---- */
        $(document).on("mouseenter", ".suspension .a",
        function() {
          var _this = $(this);
          var s = $(".suspension");
          var isService = _this.hasClass("a-service");
          var isServicePhone = _this.hasClass("a-service-phone");
          var isQrcode = _this.hasClass("a-qrcode");
          if (isService) {
            s.find(".d-service").show().siblings(".d").hide();
          }
          if (isServicePhone) {
            s.find(".d-service-phone").show().siblings(".d").hide();
          }
          if (isQrcode) {
            s.find(".d-qrcode").show().siblings(".d").hide();
          }
        });
        $(document).on("mouseleave", ".suspension, .suspension .a-top",
        function() {
          $(".suspension").find(".d").hide();
        });
        $(document).on("mouseenter", ".suspension .a-top",
        function() {
          $(".suspension").find(".d").hide();
        });
        $(document).on("click", ".suspension .a-top",
        function() {
          $("html,body").animate({
            scrollTop: 0
          });
        });
        $(window).scroll(function() {
          var st = $(document).scrollTop();
          var $top = $(".suspension .a-top");
          if (st > 400) {
            $top.css({
              display: 'block'
            });
          } else {
            if ($top.is(":visible")) {
              $top.hide();
            }
          }
        });

      });</script>

      jQuery(document).ready(function($) {
        $("body").click(function(e) {
          var a = new Array("天真", "富强", "IDQR.CN", "民主", "文明", "和谐", "自由", "平等", "公正", "法治", "IDQR.CN", "爱国", "敬业", "诚信", "IDQR.CN", "友善");

          var x = e.pageX + 0,
          y = e.pageY + 30;
          $i.css({
            "z-index": 99999,
            "top": y - 20,

            "position": "absolute",

            "color": "#ff0000"

          $("body").append($i);
          $i.animate({

          1800,
          function() {
            $i.remove();
